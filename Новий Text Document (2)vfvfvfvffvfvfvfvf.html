<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WAR ROYALE: ROOMS SYNC UPDATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --p-color: #e67e22; --bg: #0f0f0f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: manipulation; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: absolute; background: #1a1a1a; }
        .active { display: flex; }
        input { padding: 15px; border-radius: 12px; border: none; width: 280px; font-size: 16px; background: #222; color: white; border: 1px solid #444; margin-bottom: 10px; }
        #top-info { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 10px 15px; z-index: 100; box-sizing: border-box; }
        #timer { position: absolute; left: 50%; transform: translateX(-50%); background: gold; color: black; padding: 5px 15px; border-radius: 0 0 15px 15px; font-weight: bold; border: 2px solid black; }
        #game-ui { position: absolute; bottom: 5px; width: 100%; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        #battle-deck { pointer-events: auto; display: flex; gap: 5px; padding: 10px; background: rgba(0,0,0,0.8); border-radius: 15px; overflow-x: auto; max-width: 95vw; }
        .unit-btn { min-width: 65px; height: 85px; background: #34495e; border: 2px solid gold; border-radius: 8px; color: white; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
        canvas { background: #27ae60; border: 4px solid #000; display: block; margin: 0 auto; width: 340px; height: 500px; }
        .hp-label { position: absolute; width: 100%; text-align: center; font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        button { padding: 15px; margin: 8px; border-radius: 12px; border: none; width: 280px; font-size: 16px; font-weight: bold; background: var(--p-color); color: white; cursor: pointer; }
        .list-container { background: rgba(0,0,0,0.9); border: 2px solid gold; border-radius: 15px; width: 90%; max-height: 50vh; overflow-y: auto; padding: 10px; }
        .item-box { background: #222; border-bottom: 1px solid #444; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .locked-card { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <h1 style="color: gold;">WAR ROYALE</h1>
        <input type="text" id="nickname" placeholder="НІКНЕЙМ">
        <input type="password" id="password" placeholder="ПАРОЛЬ">
        <button onclick="handleAuth()">УВІЙТИ В КРІПОСТЬ</button>
    </div>

    <div id="menu-screen" class="screen">
        <div style="font-size: 28px; color: gold;">LVL: <span id="m-path">0</span> | 💰 <span id="m-coins">0</span></div>
        <button onclick="showScreen('mode-screen')" style="background: #c0392b; font-size: 22px;">В БІЙ ⚔️</button>
        <button onclick="openCards()">КОЛОДА 🃏</button>
        <button onclick="showLeaderboards()">РЕЙТИНГ 🥇</button>
        <button onclick="showScreen('promo-screen')">ПРОМО ⚙️</button>
    </div>

    <div id="mode-screen" class="screen">
        <h2 style="color: gold;">ОБЕРИ РЕЖИМ</h2>
        <button onclick="startBattle('campaign')" style="background: #27ae60;">ЛІНІЯ ПРОХОДЖЕННЯ</button>
        <button onclick="startBattle('multiplayer')" style="background: #8e44ad;">МУЛЬТИПЛЕЄР (PvP)</button>
        <button onclick="showScreen('room-screen')" style="background: #2980b9;">ГРА З ДРУГОМ (КОД)</button>
        <button onclick="showScreen('menu-screen')" style="background: #444;">НАЗАД</button>
    </div>

    <div id="room-screen" class="screen">
        <h2 style="color: gold;">КІМНАТА</h2>
        <input type="text" id="room-input" placeholder="КОД КІМНАТИ">
        <button onclick="joinRoom()">ПРИЄДНАТИСЯ</button>
        <div style="margin: 10px; color: #aaa;">АБО</div>
        <button onclick="createRoom()" style="background: #27ae60;">СТВОРИТИ КІМНАТУ</button>
        <div id="my-room-code" style="color: gold; font-size: 22px; margin: 15px; letter-spacing: 2px;"></div>
        <button onclick="showScreen('mode-screen')" style="background: #444;">НАЗАД</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="top-info">
            <div style="color: #ff4d4d;"><span id="enemy-name">ВОРОГ</span> 💧: <span id="bot-elixir">5</span></div>
            <div id="timer">03:00</div>
        </div>
        <div class="hp-label" style="top: 85px; color: #ff4d4d;" id="hp-enemy-text">5000</div>
        <canvas id="gameCanvas"></canvas>
        <div class="hp-label" style="bottom: 165px; color: #4d94ff;" id="hp-player-text">5000</div>
        <div id="game-ui">
            <div style="color:white; margin-bottom: 5px;">ТВІЙ ЕЛІКСИР: 💧 <span id="elixir-val">5</span></div>
            <div id="battle-deck"></div>
        </div>
    </div>

    <div id="list-screen" class="screen">
        <h2 id="list-title" style="color: gold;">РЕЙТИНГ</h2>
        <div id="generic-list" class="list-container"></div>
        <button onclick="showScreen('menu-screen')" style="margin-top:10px;">НАЗАД</button>
    </div>

    <div id="promo-screen" class="screen">
        <h2 style="color: gold;">ПРОМОКОД</h2>
        <input type="text" id="promo-input" placeholder="ВВЕДІТЬ КОД">
        <button onclick="applyPromo()">АКТИВУВАТИ</button>
        <button onclick="showScreen('menu-screen')" style="background:#444">НАЗАД</button>
    </div>

<script>
const ALL_UNITS = [
    {id:0, n:'Лучник', cost:2, hp:200, dmg:35, c1:'#f1c40f', sz:8, sp:1.1, mL:0},
    {id:1, n:'Мечник', cost:3, hp:650, dmg:50, c1:'#3498db', sz:10, sp:0.8, mL:0},
    {id:2, n:'Малюк X2', cost:4, hp:550, dmg:70, c1:'#e67e22', sz:7, sp:1.3, mL:3},
    {id:3, n:'Лучник+', cost:3, hp:350, dmg:55, c1:'#f1c40f', sz:8, sp:1.1, mL:5},
    {id:4, n:'Брон.Мал', cost:4, hp:1100, dmg:45, c1:'#5d6d7e', sz:9, sp:0.7, mL:8},
    {id:5, n:'Малюк X3', cost:4, hp:480, dmg:45, c1:'#e74c3c', sz:7, sp:1.3, mL:10},
    {id:6, n:'Е.Лучник', cost:3, hp:450, dmg:75, c1:'#f4d03f', sz:8, sp:1.1, mL:15},
    {id:7, n:'Глок', cost:4, hp:650, dmg:85, c1:'#7f8c8d', sz:10, sp:0.9, mL:20},
    {id:8, n:'Снайпер', cost:5, hp:400, dmg:280, c1:'#1d8348', sz:9, sp:0.6, mL:25},
    {id:9, n:'АК-47', cost:5, hp:950, dmg:130, c1:'#27ae60', sz:10, sp:0.9, mL:33},
    {id:10, n:'АК-47 X2', cost:6, hp:1300, dmg:190, c1:'#1e8449', sz:11, sp:0.8, mL:33},
    {id:11, n:'Штурм', cost:5, hp:1200, dmg:95, c1:'#515a5a', sz:11, sp:0.7, mL:35},
    {id:12, n:'Бомба', cost:5, hp:350, dmg:700, c1:'#34495e', sz:9, sp:1.4, mL:40},
    {id:13, n:'Вогнемет', cost:6, hp:1700, dmg:120, c1:'#e67e22', sz:11, sp:0.6, mL:45},
    {id:14, n:'Дробаш', cost:5, hp:1600, dmg:220, c1:'#95a5a6', sz:11, sp:0.7, mL:50},
    {id:15, n:'ТНТ X2', cost:6, hp:900, dmg:500, c1:'#c0392b', sz:10, sp:1.0, mL:50},
    {id:16, n:'РПГ', cost:7, hp:2100, dmg:350, c1:'#1b5e20', sz:12, sp:0.6, mL:60},
    {id:17, n:'М-Кіборг', cost:6, hp:2500, dmg:280, c1:'#8e44ad', sz:13, sp:0.6, mL:60},
    {id:18, n:'Танк', cost:8, hp:5500, dmg:350, c1:'#2ecc71', sz:20, sp:0.4, mL:70},
    {id:19, n:'К-Танк', cost:9, hp:6500, dmg:450, c1:'#8e44ad', sz:22, sp:0.4, mL:70},
    {id:20, n:'К-Велет', cost:10, hp:8000, dmg:550, c1:'#5b2c6f', sz:24, sp:0.3, mL:80},
    {id:21, n:'Кактус', cost:10, hp:9500, dmg:700, c1:'#2ecc71', sz:22, sp:0.3, mL:90},
    {id:22, n:'Дракончик', cost:5, hp:3500, dmg:250, c1:'#e67e22', sz:18, sp:0.7, mL:150},
    {id:23, n:'К-Дракон', cost:7, hp:9000, dmg:450, c1:'#7f8c8d', sz:22, sp:0.6, mL:400},
    {id:24, n:'Г-Дракон', cost:9, hp:18000, dmg:900, c1:'#2c3e50', sz:26, sp:0.5, mL:800},
    {id:25, n:'Ел-Дракон', cost:10, hp:30000, dmg:1500, c1:'#f1c40f', sz:32, sp:0.4, mL:1300},
    {id:26, n:'Скелети X3', cost:3, hp:1500, dmg:150, c1:'#ecf0f1', sz:7, sp:1.2, mL:1500, split: 3},
    {id:27, n:'Скелет-Боєць', cost:7, hp:40000, dmg:3000, c1:'#bdc3c7', sz:15, sp:0.5, mL:2900},
    {id:28, n:'Скелет-Гігант', cost:10, hp:150000, dmg:10000, c1:'#ffffff', sz:35, sp:0.3, mL:3900}
];

firebase.initializeApp({ databaseURL: "https://war-6ef12-default-rtdb.firebaseio.com" });
const db = firebase.database();
let player = { nick: '', pass: '', path: 0, coins: 0, deck: [0, 1], evo: [] };
let gameActive = false, elixir = 5, botElixir = 5, units = [], castles = {}, timeLeft = 180;
let enemyDeck = [0, 1], currentRoomRef = null;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 340; canvas.height = 500;

window.onload = () => {
    const saved = localStorage.getItem('war_royale_fortress');
    if(saved) { const d = JSON.parse(saved); login(d.n, d.p); }
};

function handleAuth() {
    const n = document.getElementById('nickname').value.trim();
    const p = document.getElementById('password').value.trim();
    if(n && p) login(n, p);
}

async function login(n, p) {
    try {
        const snap = await db.ref('users/' + n).once('value');
        if(snap.exists() && snap.val().pass !== p) return alert("ПАРОЛЬ НЕВІРНИЙ");
        player = snap.exists() ? {...player, ...snap.val()} : { nick: n, pass: p, path: 0, coins: 0, deck: [0, 1], evo: [] };
        if(!snap.exists()) db.ref('users/' + n).set(player);
        localStorage.setItem('war_royale_fortress', JSON.stringify({n, p}));
        updateUI(); showScreen('menu-screen');
    } catch(e) { alert("Помилка Firebase!"); }
}

// ЛОГІКА КІМНАТ З СИНХРОНІЗАЦІЄЮ
function createRoom() {
    const code = Math.floor(1000 + Math.random() * 9000);
    currentRoomRef = db.ref('rooms/' + code);
    currentRoomRef.set({
        host: player.nick,
        hostDeck: player.deck,
        hostHP: 5000 + (player.path * 100),
        status: 'waiting'
    });
    document.getElementById('my-room-code').innerText = "ТВІЙ КОД: " + code;
    
    currentRoomRef.on('value', (snap) => {
        const data = snap.val();
        if (data && data.status === 'start') {
            currentRoomRef.off();
            const enemyData = { name: data.guest, deck: data.guestDeck, hp: data.guestHP };
            startBattle('room', enemyData);
        }
    });
}

async function joinRoom() {
    const code = document.getElementById('room-input').value;
    const roomRef = db.ref('rooms/' + code);
    const snap = await roomRef.once('value');

    if (snap.exists() && snap.val().status === 'waiting') {
        const data = snap.val();
        await roomRef.update({
            guest: player.nick,
            guestDeck: player.deck,
            guestHP: 5000 + (player.path * 100),
            status: 'start'
        });
        const enemyData = { name: data.host, deck: data.hostDeck, hp: data.hostHP };
        startBattle('room', enemyData);
    } else {
        alert("Кімнату не знайдено!");
    }
}

async function startBattle(mode, roomData = null) {
    let enemyHP = 5000;
    let enemyName = "БОТ";
    enemyDeck = [0, 1];

    if(mode === 'campaign') {
        enemyHP = 5000 + (player.path * 150);
        enemyDeck = ALL_UNITS.filter(u => u.mL <= player.path + 2).map(u => u.id);
    } else if(mode === 'multiplayer') {
        const snap = await db.ref('users').limitToFirst(20).once('value');
        const users = [];
        snap.forEach(s => { if(s.key !== player.nick) users.push(s.val()); });
        if(users.length > 0) {
            let op = users[Math.floor(Math.random()*users.length)];
            enemyName = op.nick; enemyHP = 5000 + (op.path * 100); enemyDeck = op.deck;
        }
    } else if(mode === 'room') {
        enemyName = roomData.name; enemyHP = roomData.hp; enemyDeck = roomData.deck;
    }

    document.getElementById('enemy-name').innerText = enemyName;
    showScreen('game-screen');
    gameActive = true; units = []; elixir = 5; botElixir = 5; timeLeft = 180;
    castles = { 
        p: { hp: 5000 + (player.path * 100), x: 120, y: 450, w: 100, h: 40 }, 
        e: { hp: enemyHP, x: 120, y: 10, w: 100, h: 40 } 
    };
    renderBattleDeck();
    
    const gameInt = setInterval(() => {
        if(!gameActive) { clearInterval(gameInt); return; }
        elixir = Math.min(10, elixir + 0.4);
        botElixir = Math.min(10, botElixir + 0.4);
        timeLeft--;
        document.getElementById('timer').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
        
        if(botElixir >= 3 && Math.random() < 0.3) {
            let u = ALL_UNITS.find(x => x.id === enemyDeck[Math.floor(Math.random()*enemyDeck.length)]);
            if(botElixir >= u.cost) { botElixir -= u.cost; spawn(u, 'e'); }
        }
    }, 1000);
    loop();
}

function spawn(u, team) {
    const m = player.evo?.includes(u.id) ? 3 : 1;
    const count = u.split || 1;
    for(let i=0; i<count; i++) {
        units.push({ ...u, team, hp: u.hp*m, curHp: u.hp*m, dmg: u.dmg*m, x: 140+Math.random()*60, y: team==='p'?440:60 });
    }
}

function loop() {
    if(!gameActive) return;
    ctx.fillStyle = "#27ae60"; ctx.fillRect(0,0,340,500);
    ctx.fillStyle = "#2980b9"; ctx.fillRect(0, 240, 340, 20); 
    ctx.fillStyle = "#7f8c8d"; ctx.fillRect(130, 230, 80, 40);
    ctx.fillStyle = "#c0392b"; ctx.fillRect(castles.e.x, castles.e.y, castles.e.w, castles.e.h); 
    ctx.fillStyle = "#2980b9"; ctx.fillRect(castles.p.x, castles.p.y, castles.p.w, castles.p.h); 

    units.forEach(u => {
        let enemy = units.find(e => e.team !== u.team && Math.hypot(e.x-u.x, e.y-u.y) < (u.sz + e.sz + 5));
        let threat = units.find(e => e.team !== u.team && Math.hypot(e.x-u.x, e.y-u.y) < 100);

        if(enemy) { enemy.curHp -= u.dmg/60; } 
        else if (threat) {
            let dx = threat.x-u.x, dy = threat.y-u.y, dist = Math.sqrt(dx*dx+dy*dy);
            u.x += (dx/dist)*u.sp; u.y += (dy/dist)*u.sp;
        } else {
            if(u.team === 'p' && u.y <= castles.e.y + castles.e.h + 5) castles.e.hp -= u.dmg/60;
            else if(u.team === 'e' && u.y >= castles.p.y - 5) castles.p.hp -= u.dmg/60;
            else { u.y += u.team === 'p' ? -u.sp : u.sp; if(u.x < 165) u.x += 0.2; else if(u.x > 175) u.x -= 0.2; }
        }
        ctx.fillStyle = u.team === 'p' ? u.c1 : '#333';
        ctx.beginPath(); ctx.arc(u.x, u.y, u.sz, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.fillRect(u.x-10, u.y-u.sz-8, 20, 4);
        ctx.fillStyle = u.team === 'p' ? "lime" : "red";
        ctx.fillRect(u.x-10, u.y-u.sz-8, (u.curHp/u.hp)*20, 4);
    });

    units = units.filter(u => u.curHp > 0);
    document.getElementById('elixir-val').innerText = Math.floor(elixir);
    document.getElementById('hp-player-text').innerText = "HP: " + Math.floor(castles.p.hp);
    document.getElementById('hp-enemy-text').innerText = "HP: " + Math.floor(castles.e.hp);
    document.getElementById('bot-elixir').innerText = Math.floor(botElixir);
    
    if(castles.p.hp <= 0 || castles.e.hp <= 0) endGame(castles.e.hp <= 0);
    else requestAnimationFrame(loop);
}

function endGame(win) {
    gameActive = false; 
    if(win) { alert("ПЕРЕМОГА! +1 МОНЕТА"); player.path++; player.coins++; }
    else alert("ПОРАЗКА!");
    db.ref('users/' + player.nick).set(player);
    updateUI(); showScreen('menu-screen');
}

function updateUI() { 
    document.getElementById('m-path').innerText = player.path; 
    document.getElementById('m-coins').innerText = player.coins || 0;
}

function showScreen(id) { 
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}

async function showLeaderboards() {
    showScreen('list-screen');
    const snap = await db.ref('users').once('value');
    let u = []; snap.forEach(s => u.push(s.val()));
    u.sort((a,b) => b.path - a.path);
    document.getElementById('generic-list').innerHTML = u.slice(0,10).map((x,i) => `<div class="item-box">#${i+1} ${x.nick} <b>LVL: ${x.path}</b></div>`).join('');
}

function openCards() {
    showScreen('list-screen');
    document.getElementById('generic-list').innerHTML = ALL_UNITS.map(u => {
        let lock = player.path < u.mL;
        return `<div class="item-box ${lock ? 'locked-card' : ''}" style="border:1px solid ${player.deck.includes(u.id)?'lime':'#444'}" onclick="toggleCard(${u.id}, ${lock})">
            <span>${lock ? '🔒 ' : ''}${u.n}</span> <span>💧${u.cost}</span>
        </div>`;
    }).join('') + `<button onclick="saveDeck()" style="background:green">ЗБЕРЕГТИ</button>`;
}

function toggleCard(id, lock) {
    if(lock) return;
    if(player.deck.includes(id)) player.deck = player.deck.filter(i => i !== id);
    else if(player.deck.length < 5) player.deck.push(id);
    openCards();
}

function saveDeck() { db.ref('users/'+player.nick).update({deck:player.deck}); showScreen('menu-screen'); }

function renderBattleDeck() {
    const d = document.getElementById('battle-deck'); d.innerHTML = '';
    player.deck.forEach(id => {
        const u = ALL_UNITS.find(x => x.id === id);
        const b = document.createElement('div'); b.className = 'unit-btn';
        b.innerHTML = `${u.n}<br>💧${u.cost}`;
        b.onclick = () => { if(elixir >= u.cost) { elixir -= u.cost; spawn(u, 'p'); } };
        d.appendChild(b);
    });
}

function applyPromo() {
    const val = document.getElementById('promo-input').value;
    if(val === "BORIS") { if(!player.evo.includes(17)) player.evo.push(17); alert("КІБОРГ!"); }
    db.ref('users/'+player.nick).update({evo: player.evo});
}
</script>
</body>
</html>
